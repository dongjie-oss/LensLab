name: 自动构建并推送Docker镜像到阿里云ACR

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
  workflow_dispatch:

env:
  ACR_REGISTRY: ${{ vars.ALIYUN_REGISTRY }}
  ACR_NAMESPACE: ${{ vars.ALIYUN_NAME_SPACE }}
  IMAGE_NAME: exposure-lab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        run: |
          echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | \
          docker login ${{ env.ACR_REGISTRY }} \
            -u "${{ secrets.ALIYUN_REGISTRY_USER }}" \
            --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
