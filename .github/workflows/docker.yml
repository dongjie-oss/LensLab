name: 自动构建并推送Docker镜像到阿里云ACR

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "*.png"
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 v1.1.0）'
        required: false
        type: string

env:
  ACR_REGISTRY: ${{ vars.ALIYUN_REGISTRY }}
  ACR_NAMESPACE: ${{ vars.ALIYUN_NAME_SPACE }}
  IMAGE_NAME: exposure-lab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      BUILD_VERSION: ${{ github.event.inputs.version || 'dev-' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        run: |
          echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | \
          docker login ${{ env.ACR_REGISTRY }} \
            -u "${{ secrets.ALIYUN_REGISTRY_USER }}" \
            --password-stdin

      - name: Generate version tag
        id: tag
        run: |
          # 读取代码版本（用于构建参数）
          PY_VERSION=$(grep -oP '"\K[0-9]+\.[0-9]+\.[0-9]+' backend/__version__.py 2>/dev/null || echo "0.0.0")
          echo "python_version=${PY_VERSION}" >> $GITHUB_OUTPUT
          if [[ "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            # git tag "v1.0.2" → 保留 "v1.0.2"
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            RAW="${{ github.event.inputs.version }}"
            # 没有 v 前缀则补上
            if [[ "$RAW" =~ ^v ]]; then
              TAG="$RAW"
            else
              TAG="v$RAW"
            fi
          else
            TAG="latest"
          fi
          echo "tag_version=${TAG}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ steps.tag.outputs.python_version }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
