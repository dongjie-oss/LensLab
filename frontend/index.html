<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>镜头演算室 · LensLab</title>
<script src="assets/react.production.min.js"></script>
<script src="assets/react-dom.production.min.js"></script>
<link href="assets/tailwind.css?v=1780819828" rel="stylesheet">
<link href="assets/fonts-local.css" rel="stylesheet">
<style>
  * { font-family: 'Inter', -apple-system, sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  
  /* 自定义滚动条 */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #475569; }

  /* 测光点动画 */
  @keyframes pulse-ring {
    0% { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .metering-dot::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid currentColor;
    animation: pulse-ring 2s ease-out infinite;
  }

  /* 图片容器 */
  .image-container {
    position: relative;
    display: inline-block;
    max-width: 100%;
  }
  .image-container img {
    max-width: 100%;
    max-height: 70vh;
    display: block;
  }

  /* 拖拽上传 */
  .drop-zone {
    border: 2px dashed #334155;
    transition: all 0.3s;
  }
  .drop-zone.drag-over {
    border-color: #60a5fa;
    background: rgba(96, 165, 250, 0.05);
  }

  /* 直方图 */
  .histogram-bar {
    transition: height 0.3s ease;
  }
</style>
</head>
<body class="bg-[#0a0e17] text-slate-200 min-h-screen">
<div id="root"></div>
<div id="admin-root"></div>

<script>
  window.__version__ = "...";
  fetch('/api/version').then(r => r.json()).then(d => { if (d.version) window.__version__ = d.version; }).catch(() => {});
</script>
<!-- Loader: desktop=1 forces old desktop; mobile=1 forces mobile; otherwise auto-detects by width -->
<script>
  (function() {
    const url = new URL(window.location.href);
    const forceDesktop = url.searchParams.get('desktop') === '1';
    const forceMobile = url.searchParams.get('mobile') === '1';
    // 优先用 UA 判断移动设备，其次用屏幕宽度
    const ua = navigator.userAgent || '';
    const isMobileUA = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
    const isMobileScreen = window.innerWidth < 1024;
    const isMobile = isMobileUA || isMobileScreen;

    // admin panel is same for all
    document.write('<scr' + 'ipt src="assets/admin-panel.compiled.js?v=1780819828"><\/script>');

    let mainSrc;
    if (forceDesktop) {
      mainSrc = 'assets/app.compiled.js?v=1780823500';
    } else if (forceMobile || isMobile) {
      window.__LENSLAB_MOBILE__ = true; // 标记移动端，React 会读取
      mainSrc = 'assets/app.mobile.js?v=1780823200';
    } else {
      mainSrc = 'assets/app.compiled.js?v=1780823500';
    }
    document.write('<scr' + 'ipt src="' + mainSrc + '"><\/script>');
  })();
</script>
<!-- Mobile Enhancer: 响应式布局 + 触摸支持，不修改原始 React 代码 -->
<script src="assets/mobile-enhancer.js?v=4"></script>
</body>
</html>
