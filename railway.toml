# Railway Nixpacks 构建配置
[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["cd backend && pip install --break-system-packages -r requirements.txt"]

[phases.build]
cmds = []

[start]
cmd = "cd backend && python -m uvicorn server:app --host 0.0.0.0 --port $PORT"
