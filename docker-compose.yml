version: "3.8"

services:
  lenslab:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_VERSION=1.0.2
    image: ${ACR_IMAGE:-registry.cn-hangzhou.aliyuncs.com/exposure-lab/exposure-lab:1.0.2}
    container_name: lenslab
    restart: unless-stopped
    ports:
      - "8888:8765"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - DATA_DIR=/app/data
      # ACR 仓库配置（用于版本检测）
      - ACR_REGISTRY=${ACR_REGISTRY:-registry.cn-hangzhou.aliyuncs.com}
      - ACR_NAMESPACE=${ACR_NAMESPACE:-exposure-lab}
      - ACR_REPO=${ACR_REPO:-exposure-lab}
      # ACR 认证（用于版本检测查询）
      - ACR_USERNAME=${ACR_USERNAME:-}
      - ACR_PASSWORD=${ACR_PASSWORD:-}
      # AI 配置（已移除，改由 config.json 管理）
